<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MonitorPro - System Alerts Log</title>
    
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#f8f9ff",
                        "primary": "#0051d6",
                        "secondary": "#486459",
                        "surface": "#ffffff"
                    },
                    borderRadius: {
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(12, 15, 10, 0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(12, 15, 10, 0.3); }

        /* Root color theme configuration */
        :root {
            --success: #22c55e;
            --danger: #ba1a1a;
            --text-primary: #0c0f0a;
            --border-glass: rgba(12, 15, 10, 0.08);
        }

        /* Styling for filter tabs */
        .filter-tab {
            background-color: #ffffff;
            color: #0c0f0a;
            border: 1px solid rgba(12, 15, 10, 0.1);
            font-size: 13px;
            font-weight: 700;
            padding: 10px 22px;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .filter-tab:hover {
            background-color: rgba(12, 15, 10, 0.05);
        }
        .filter-tab.active {
            background-color: #ffdb0f;
            color: #0c0f0a;
            border-color: #ffdb0f;
            box-shadow: 0 4px 12px rgba(255, 219, 15, 0.25);
        }

        /* Dynamically injected badge CSS classes from alerts.js */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .bg-secondary-glow {
            background-color: rgba(12, 15, 10, 0.05);
            color: rgba(12, 15, 10, 0.6);
            border: 1px solid rgba(12, 15, 10, 0.1);
        }
        .bg-success-glow {
            background-color: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .bg-danger-glow {
            background-color: rgba(220, 38, 38, 0.1);
            color: #dc2626;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }
    </style>
</head>
<body class="antialiased selection:bg-[#ffdb0f] selection:text-[#0c0f0a] w-full min-h-screen m-0 p-0 overflow-x-hidden bg-background">

    <div class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar -->
        <nav class="bg-[#0c0f0a] h-full w-64 flex-shrink-0 flex flex-col z-40 shadow-2xl">
            <div class="p-6 flex items-center gap-3 mt-2">
                <div class="w-9 h-9 bg-[#ffffff] rounded-full flex items-center justify-center shadow-lg">
                    <div class="w-4 h-4 bg-[#0c0f0a] rounded-full"></div>
                </div>
                <div>
                    <h1 class="text-[22px] font-black text-[#ffffff] tracking-tight">MonitorPro</h1>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto mt-6 px-4">
                <ul class="flex flex-col gap-2">
                    <li>
                        <a href="dashboard.html" class="text-[#ffffff]/60 flex items-center gap-3 px-4 py-3.5 hover:bg-[#ffffff]/10 hover:text-[#ffffff] rounded-xl transition-all duration-300 font-medium">
                            <span class="material-symbols-outlined">dashboard</span>
                            <span class="text-[14px]">Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="devices.html" class="text-[#ffffff]/60 flex items-center gap-3 px-4 py-3.5 hover:bg-[#ffffff]/10 hover:text-[#ffffff] rounded-xl transition-all duration-300 font-medium">
                            <span class="material-symbols-outlined">devices</span>
                            <span class="text-[14px]">Devices</span>
                        </a>
                    </li>
                    <li>
                        <a href="alerts.html" class="text-[#0c0f0a] font-bold bg-[#ffdb0f] rounded-xl flex items-center gap-3 px-4 py-3.5 shadow-sm transition-transform duration-300 hover:scale-[1.02]">
                            <span class="material-symbols-outlined">notifications_active</span>
                            <span class="text-[14px]">Alerts</span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="p-6 mt-auto">
                <div class="mb-4 px-4 py-3 bg-[#ffffff]/5 rounded-xl">
                    <div class="text-[14px] font-bold text-[#ffffff]" id="currentUser">Admin Console</div>
                    <div class="text-[11px] text-[#ffffff]/40 uppercase tracking-wider font-semibold">Administrator</div>
                </div>
                <ul class="flex flex-col gap-2">
                    <li>
                        <a href="javascript:void(0)" id="logoutBtn" class="text-[#ffffff]/60 flex items-center gap-3 px-4 py-3.5 hover:bg-[#ffffff]/10 hover:text-[#ffffff] rounded-xl transition-all duration-300 font-medium">
                            <span class="material-symbols-outlined">logout</span>
                            <span class="text-[14px]">Logout</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col h-full overflow-y-auto">
            <!-- Header -->
            <header class="bg-[#f9f9f9]/80 backdrop-blur-md flex justify-between items-center w-full px-10 py-6 sticky top-0 z-30 transition-all border-b border-[#0c0f0a]/5">
                <div class="flex-1">
                    <h2 class="text-[32px] font-black text-[#0c0f0a] tracking-tight">System Alerts Log</h2>
                </div>
                <div class="flex items-center gap-2">
                    <span class="inline-flex items-center px-4 py-2 rounded-full bg-[#ffdb0f]/10 border border-[#ffdb0f]/30 text-[#86750d] text-[12px] font-bold tracking-wider">
                        <span class="w-2 h-2 rounded-full bg-[#86750d] animate-pulse mr-2"></span> SSE Live Connection
                    </span>
                </div>
            </header>

            <main class="flex-1 px-10 pb-10 space-y-8 mt-6">
                <!-- Filters tabs row -->
                <div class="flex gap-3 pb-2 border-b border-[#0c0f0a]/5">
                    <button class="filter-tab active" id="btnFilterAll">All Alerts Log</button>
                    <button class="filter-tab" id="btnFilterActive">Active Violations Only</button>
                </div>

                <!-- Table Card Container -->
                <div class="bg-[#ffffff] rounded-3xl border border-[#0c0f0a]/5 overflow-hidden flex flex-col shadow-sm">
                    <div class="overflow-x-auto p-4">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b-2 border-[#f9f9f9]">
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Timestamp</th>
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Device Name</th>
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Metric / Rule</th>
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Trigger Value</th>
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Threshold</th>
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Alert Message</th>
                                    <th class="py-4 px-6 text-[12px] font-bold text-[#0c0f0a]/40 uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody id="alertsTableBody" class="text-[14px] text-[#0c0f0a] font-medium">
                                <tr>
                                    <td colspan="7" class="text-center text-[#0c0f0a]/40 py-8">Loading system alerts log...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/alerts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Set active role display from localStorage if present
            const username = localStorage.getItem('username') || 'Admin Console';
            const userDisplay = document.getElementById('currentUser');
            if (userDisplay) userDisplay.textContent = username;

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('username');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
