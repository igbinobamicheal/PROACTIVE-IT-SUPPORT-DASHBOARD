<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In | MonitorPro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <script src="js/icons.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        bg: "#050505", surface: "#0E0E10", card: "#141417",
                        borderSubtle: "rgba(255, 255, 255, 0.08)",
                        primary: "#8B5CF6", primaryHover: "#7C3AED",
                        textMain: "#FAFAFA", textMuted: "#A1A1AA", textSubtle: "#52525B",
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #FAFAFA; font-family: 'Inter', sans-serif; }
        .bg-pattern {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .form-input {
            background: #0E0E10; border: 1px solid rgba(255,255,255,0.1); color: #FAFAFA;
            transition: all 0.2s ease;
        }
        .form-input:focus { border-color: #8B5CF6; outline: none; box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.2); }
        .error-banner {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #F43F5E;
        }
    </style>
</head>
<body class="w-full min-h-screen m-0 p-0 overflow-hidden flex bg-bg">

    <div class="hidden lg:flex flex-1 border-r border-borderSubtle bg-surface flex-col items-center justify-center p-12 relative overflow-hidden">
        <div class="bg-pattern"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-bg to-transparent z-10 pointer-events-none opacity-90"></div>
        
        <div class="w-full max-w-sm border border-borderSubtle bg-bg/50 backdrop-blur-md rounded-xl p-6 z-20 shadow-2xl">
            <div class="flex items-center justify-between mb-6 border-b border-borderSubtle pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-white/[0.04] border border-borderSubtle flex items-center justify-center">
                        <i data-lucide="activity" class="w-4 h-4 text-primary"></i>
                    </div>
                    <div>
                        <div class="text-[12px] font-medium text-textMain">Global Cluster</div>
                        <div class="text-[11px] text-textMuted font-mono">us-east-1</div>
                    </div>
                </div>
                <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[10px] font-mono uppercase tracking-wide">
                    <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div> Normal
                </div>
            </div>
            
            <div class="flex flex-col gap-4">
                <div>
                    <div class="flex justify-between text-[11px] text-textMuted mb-1 font-mono"><span class="uppercase">CPU Load</span> <span>42%</span></div>
                    <div class="w-full h-1 bg-white/[0.05] rounded-full overflow-hidden"><div class="h-full bg-primary w-[42%]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[11px] text-textMuted mb-1 font-mono"><span class="uppercase">Mem Alloc</span> <span>8.4GB</span></div>
                    <div class="w-full h-1 bg-white/[0.05] rounded-full overflow-hidden"><div class="h-full bg-zinc-400 w-[60%]"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col justify-center px-8 sm:px-16 lg:px-24 bg-bg relative">
        <div class="w-full max-w-sm mx-auto">
            <div class="flex items-center gap-2 mb-10 cursor-pointer" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#8B5CF6" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#8B5CF6" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#8B5CF6" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                <span class="text-[16px] font-semibold tracking-tight text-textMain">MonitorPro</span>
            </div>
            
            <h2 class="text-[22px] font-semibold mb-1 tracking-tight text-textMain">Welcome back</h2>
            <p class="text-[14px] text-textMuted mb-8 font-medium">Enter your credentials to access the console.</p>

            <form id="loginForm" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[12px] font-medium text-textMuted" for="username">Username / Admin ID</label>
                    <input class="form-input rounded-md px-3 py-2 text-[13px]" id="username" placeholder="admin" required type="text" autocomplete="username"/>
                </div>
                <div class="flex flex-col gap-1.5">
                    <div class="flex justify-between items-center">
                        <label class="text-[12px] font-medium text-textMuted" for="password">Password</label>
                        <a class="text-[11px] text-textMuted hover:text-textMain transition-colors" href="#">Forgot password?</a>
                    </div>
                    <input class="form-input rounded-md px-3 py-2 text-[13px]" id="password" placeholder="••••••••" required type="password" autocomplete="current-password"/>
                </div>
                
                <!-- Error or Success Message Banner -->
                <div id="errorMessage" class="error-banner hidden p-3 rounded-md text-[13px] text-center font-medium mt-1"></div>

                <div class="flex items-center gap-2 mt-1">
                    <input class="rounded bg-bg border-borderSubtle accent-primary focus:ring-0 focus:ring-offset-0 cursor-pointer" id="remember" type="checkbox"/>
                    <label class="text-[12px] font-semibold text-textMuted cursor-pointer select-none" for="remember">Persist Session</label>
                </div>
                
                <button type="submit" id="loginBtn" class="w-full bg-textMain text-bg text-[13px] font-semibold py-2.5 rounded-md mt-2 hover:bg-zinc-200 transition-colors flex items-center justify-center gap-2">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-spinner hidden w-4 h-4 border-2 border-bg border-t-transparent rounded-full animate-spin"></span>
                </button>
            </form>

            <div class="relative flex items-center justify-center my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-borderSubtle"></div></div>
                <div class="relative bg-bg px-2 text-[11px] font-medium text-textSubtle uppercase tracking-widest">Or continue with</div>
            </div>

            <button class="w-full bg-surface border border-borderSubtle text-[13px] font-medium py-2 rounded-md hover:bg-white/[0.04] transition-colors flex items-center justify-center gap-2 text-textMain">
                <i data-lucide="shield" class="w-4 h-4"></i> Single Sign-On (SAML)
            </button>
            
            <p class="text-[13px] text-textMuted text-center mt-8 font-medium">
                Don't have an account? <a href="signup.html" class="text-textMain hover:text-primary transition-colors">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
