<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Infrastructure | MonitorPro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <script src="js/icons.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        bg: "#ECEAE5",
                        surface: "rgba(255, 255, 255, 0.62)",
                        card: "rgba(255, 255, 255, 0.62)",
                        borderSubtle: "rgba(30, 26, 23, 0.08)",
                        primary: "#B87C3B", primaryHover: "#9c642c", success: "#10B981", warning: "#B87C3B", danger: "#EF4444",
                        textMain: "#1E1A17", textMuted: "#4A4540", textSubtle: "#7C7770",
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ECEAE5; color: #1E1A17; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C4C2BC; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #A4A29C; }
        
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.45) !important;
            background-color: rgba(255, 255, 255, 0.62) !important;
            box-shadow: 0 8px 32px 0 rgba(30, 26, 23, 0.03);
        }
    </style>
</head>
<body class="w-full h-screen overflow-hidden flex bg-bg relative">

    <!-- Sidebar -->
    <nav class="bg-[#151310] h-full w-[220px] flex-shrink-0 flex flex-col border-r border-white/5 z-40 text-zinc-400">
        <div class="px-5 py-4 flex items-center gap-2 mb-4">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#B87C3B" stroke-width="2" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#B87C3B" stroke-width="2" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#B87C3B" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span class="text-[14px] font-semibold tracking-tight text-white">MonitorPro</span>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 pb-4 space-y-6">
            <div>
                <div class="text-[10px] font-semibold text-zinc-500 px-3 mb-2 uppercase tracking-widest">Platform</div>
                <ul class="flex flex-col gap-0.5">
                    <li>
                        <a href="dashboard.html" class="flex items-center gap-3 pl-3 pr-4 py-2 border-l-2 border-transparent text-zinc-400 hover:text-white hover:bg-white/[0.01] text-[13px] font-medium transition-all">
                            <i data-lucide="layout-dashboard" class="w-4 h-4 text-zinc-500"></i> Overview
                        </a>
                    </li>
                    <li>
                        <a href="devices.html" class="flex items-center gap-3 pl-3 pr-4 py-2 border-l-2 border-primary text-primary text-[13px] font-semibold bg-white/[0.02]">
                            <i data-lucide="server" class="w-4 h-4 text-primary"></i> Infrastructure
                        </a>
                    </li>
                    <li>
                        <a href="deploy-agent.html" class="flex items-center gap-3 pl-3 pr-4 py-2 border-l-2 border-transparent text-zinc-400 hover:text-white hover:bg-white/[0.01] text-[13px] font-medium transition-all">
                            <i data-lucide="rocket" class="w-4 h-4 text-zinc-500"></i> Deploy Agent
                        </a>
                    </li>
                </ul>
            </div>

            <div>
                <div class="text-[10px] font-semibold text-zinc-500 px-3 mb-2 uppercase tracking-widest">Investigate</div>
                <ul class="flex flex-col gap-0.5">
                    <li>
                        <a href="alerts.html" class="flex items-center justify-between pl-3 pr-4 py-2 border-l-2 border-transparent text-zinc-400 hover:text-white hover:bg-white/[0.01] text-[13px] font-medium transition-all">
                            <div class="flex items-center gap-3"><i data-lucide="alert-circle" class="w-4 h-4 text-zinc-500"></i> Alerts</div>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
        
        <div class="p-3 border-t border-white/5">
            <div class="mb-3 px-3 py-2 bg-white/[0.02] border border-white/5 rounded-md">
                <div class="text-[12px] font-medium text-white truncate" id="currentUser">Admin Console</div>
                <div class="text-[10px] text-zinc-500 font-mono uppercase mt-0.5">Administrator</div>
            </div>
            <button id="logoutBtn" class="flex items-center gap-3 w-full p-2 rounded-md hover:bg-white/[0.02] text-zinc-400 hover:text-white text-[13px] font-medium transition-all text-left border border-transparent hover:border-white/5">
                <i data-lucide="log-out" class="w-4 h-4 text-zinc-500"></i> Sign Out
            </button>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-transparent relative">
        <!-- Background Radial Gradients for glassmorphism depth -->
        <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden bg-[#ECEAE5]">
            <div class="absolute -top-[20%] -left-[10%] w-[50%] aspect-square rounded-full bg-gradient-to-br from-[#B87C3B]/8 to-transparent blur-[120px]"></div>
            <div class="absolute -bottom-[20%] -right-[10%] w-[60%] aspect-square rounded-full bg-gradient-to-tl from-[#B87C3B]/6 to-transparent blur-[140px]"></div>
            <div class="absolute top-[30%] left-[50%] w-[40%] aspect-square rounded-full bg-gradient-to-r from-[#B87C3B]/4 to-transparent blur-[100px]"></div>
        </div>

        <header class="bg-bg/85 backdrop-blur-md border-b border-borderSubtle flex justify-between items-center px-6 h-14 sticky top-0 z-30">
            <div class="flex items-center gap-3 text-[13px] font-medium text-textMuted">
                <a href="dashboard.html" class="hover:text-textMain transition-colors">Overview</a>
                <span class="text-borderSubtle">/</span>
                <span class="text-textMain">Infrastructure</span>
            </div>
            <div class="flex items-center gap-3">
                <button class="border border-borderSubtle bg-surface text-textMain px-3 py-1.5 rounded-md text-[12px] font-medium hover:bg-black/[0.02] transition-colors flex items-center gap-2">
                    <i data-lucide="download" class="w-3.5 h-3.5 text-textSubtle"></i> Export CSV
                </button>
            </div>
        </header>

        <div class="p-8 flex-1 flex flex-col gap-4 max-w-[1200px] mx-auto w-full">
            
            <div class="flex justify-between items-center bg-surface border border-borderSubtle p-2 rounded-md glass-panel shadow-sm">
                <div class="flex items-center gap-2 w-1/3">
                    <i data-lucide="search" class="w-4 h-4 text-textSubtle ml-2"></i>
                    <input id="searchInput" class="bg-transparent border-none text-[13px] text-textMain w-full focus:outline-none placeholder:text-textSubtle font-mono" placeholder="Search ID, Name, IP..." type="text"/>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-surface border border-borderSubtle rounded-md overflow-hidden flex-1 flex flex-col glass-panel shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-[12px]">
                        <thead>
                            <tr class="border-b border-borderSubtle bg-black/[0.005]">
                                <th class="py-2.5 px-4 font-medium text-textSubtle font-mono uppercase tracking-widest text-[10px] w-10"><input type="checkbox" class="rounded bg-white border-borderSubtle text-primary accent-primary cursor-pointer"></th>
                                <th class="py-2.5 px-4 font-medium text-textSubtle font-mono uppercase tracking-widest text-[10px]">ID / Name</th>
                                <th class="py-2.5 px-4 font-medium text-textSubtle font-mono uppercase tracking-widest text-[10px]">Status</th>
                                <th class="py-2.5 px-4 font-medium text-textSubtle font-mono uppercase tracking-widest text-[10px]">IP / Region</th>
                                <th class="py-2.5 px-4 font-medium text-textSubtle font-mono uppercase tracking-widest text-[10px]">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="devicesTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-textMuted py-8">Loading registered monitoring agents...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Core Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/devices.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('username');
                window.location.href = 'login.html';
            });

            // Local search feature
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase().trim();
                    const rows = document.querySelectorAll('#devicesTableBody tr');
                    rows.forEach(row => {
                        if (row.cells.length < 4) return; // ignore helper rows
                        const text = row.innerText.toLowerCase();
                        if (text.includes(query)) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
