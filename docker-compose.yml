version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: it_monitoring_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: it_monitoring
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Auto-run schema files during startup
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    restart: unless-stopped

volumes:
  db_data:
